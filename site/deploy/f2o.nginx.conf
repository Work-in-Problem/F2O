# /etc/nginx/conf.d/f2o.conf — F2O static site (f2o.workinproblem.com)
# Static variant of the WIP template: no backend, webroot = /opt/f2o/app.
# Additive only: edit this file, `nginx -t`, then `systemctl reload nginx`.

limit_req_zone $binary_remote_addr zone=f2o_page:10m rate=120r/m;

server {
    listen 80;
    listen [::]:80;
    server_name f2o.workinproblem.com;
    location /.well-known/acme-challenge/ { root /var/www/f2o-acme; }
    location / { return 301 https://f2o.workinproblem.com$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name f2o.workinproblem.com;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/f2o.workinproblem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/f2o.workinproblem.com/privkey.pem;

    root /opt/f2o/app;
    index index.html;
    limit_req_status 429;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;

    location / {
        limit_req zone=f2o_page burst=60 nodelay;
        try_files $uri $uri/ =404;
    }

    # static caching (page short, assets can revalidate)
    location ~* \.(css|js)$ {
        limit_req zone=f2o_page burst=60 nodelay;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        # re-declare security headers lost by nested add_header
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
